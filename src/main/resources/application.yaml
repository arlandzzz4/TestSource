spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
    group:
      local: "local,common"
      dev: "dev,common"
      prod: "prod,common"

# --- 여기서부터는 모든 환경 공통 설정 ---
  application:
    name: sisa-project

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
      write-date-timestamps-as-nanoseconds: false
    time-zone: Asia/Seoul
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:none}
    password: ${MAIL_PASSWORD:none}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  # Nginx가 넘겨준 X-Forwarded-Proto(https) 헤더를 스프링이 인식하게 합니다.
  forward-headers-strategy: framework
  # 혹은 톰캣 설정을 직접 건드리는 방법
  tomcat:
    remote-ip-header: x-forwarded-for
    protocol-header: x-forwarded-proto
springdoc:
  swagger-ui:
    persist-authorization: true
    doc-expansion: list

mybatis:
 mapper-locations:
 - classpath:mapper/**/*.xml
 - classpath:mapper.common/*.xml
 configuration:
    map-underscore-to-camel-case: true

jwt:  
  secret: ${JWT_SECRET:ENC(53hWAIu/kM3EwR7Rcbk3d0S0yiuc5NV6bHpzeZkKr3MYjUNT10RxbDt44sHjn4DVEurNUa8AH65xtxw9Q5TPPZr94Q1Kl+SChj3U2fADo3s=)}
  access-token-expiration: 1800000 
  refresh-token-expiration: 604800000 

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"