name: Backend Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: spring-backend
    steps:
      - uses: actions/checkout@v4 # v4로 업데이트 권장

      # 1. Java 세팅 (컴파일을 위해 필요)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Gradle 빌드 (demo 폴더 내부에서 실행)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean compileJava build -x test

      # 3. 도커 로그인
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 4. 이미지 빌드 및 푸시 (경로를 ./로 지정)
      - name: Docker Build & Push
        run: |
          # -f로 Dockerfile 위치를 찍고, 마지막에 컨텍스트 경로를 ./로 지정합니다.
          docker build -f ./Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/spring-backend:latest ./
          docker push ${{ secrets.DOCKER_USERNAME }}/spring-backend:latest

      - name: Copy Production Config to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 깃허브 레포지토리 루트에 있는 prod 파일을 서버로 보냅니다.
          source: "docker-compose-prod.yml" 
          target: "/home/ubuntu/app/"

      # 5. EC2 접속 및 배포 실행
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
          script: |
            cd ~/app
            # 1. 환경 변수 파일 생성 (멀티라인 대응을 위해 따옴표 권장)
            echo "${{ secrets.ENV_PRODUCTION }}" > .env.prod

            sudo docker compose -f docker-compose-prod.yml down backend
            sudo docker image prune -f

            sudo GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID \
                 GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET \
                 docker compose -f docker-compose-prod.yml pull backend

            sudo GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID \
                 GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET \
                 docker compose -f docker-compose-prod.yml up -d --force-recreate backend