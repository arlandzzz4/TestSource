name: Backend Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: spring-backend
    steps:
      - uses: actions/checkout@v4 # v4로 업데이트 권장

      # 1. Java 세팅 (컴파일을 위해 필요)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Gradle 빌드 (demo 폴더 내부에서 실행)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test -p ./

      # 3. 도커 로그인
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 4. 이미지 빌드 및 푸시 (경로를 ./로 지정)
      - name: Docker Build & Push
        run: |
          # -f로 Dockerfile 위치를 찍고, 마지막에 컨텍스트 경로를 ./로 지정합니다.
          docker build -f ./Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/spring-backend:latest ./
          docker push ${{ secrets.DOCKER_USERNAME }}/spring-backend:latest

      # 5. EC2 접속 및 배포 실행
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            # 1. 환경 변수 파일 생성 (멀티라인 대응을 위해 따옴표 권장)
            echo "${{ secrets.ENV_PRODUCTION }}" > .env.prod

            # 2. 기존 서비스 중지 (수동 실행과의 충돌 방지)
            sudo docker compose down backend

            # 3. 최신 이미지 가져오기
            sudo docker compose pull backend

            # 4. 백그라운드 실행 (환경 변수 파일 적용 확인)
            sudo docker compose up -d backend

            # 5. 안 쓰는 이미지 정리 (디스크 용량 확보 - t3.small 유지에 중요)
            sudo docker image prune -f