spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/sisa?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: sisadb
    password: ENC(NoLInuIXCZTlwYPVtu+2vA==)
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate: 
      ddl-auto: none
    show-sql: true
    properties: 
      hibernate:  
        format_sql: true
        highlight_sql: true
decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true # 쿼리를 줄바꿈해서 예쁘게 보여줌
      logging: slf4j
      tracing:
        include-parameter-values: true # 파라미터 값 포함 여부
logging:
  level:
    root: info                          # 전체 기본값은 info
    com.project.domain.auth: debug       # 내 소스 코드는 상세히(debug)
    org.hibernate.SQL: info
    org.apache.coyote: info
    org.apache.tomcat: info