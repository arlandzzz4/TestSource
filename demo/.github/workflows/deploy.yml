name: Backend Deploy to EC2

on:
  push:
    branches: [ main ] # main 브랜치에 푸시될 때 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. 도커 로그인 및 이미지 빌드/푸시
      - name: Docker Login & Build & Push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_USERNAME }}/spring-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/spring-backend:latest

      # 2. EC2 접속 및 배포 실행
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            # GitHub Secrets에 저장된 .env 내용을 파일로 쓰기
            echo "${{ secrets.ENV_PRODUCTION }}" > .env.prod
            docker compose pull backend
            docker compose up -d backend
            docker image prune -f # 오래된 이미지 정리